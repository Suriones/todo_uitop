services:
  - type: web
    name: todo-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # SQLite file path inside Render's persistent disk (see disk below)
      - key: DB_PATH
        value: /data/todos.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
